name: TheExit Cron Pings

on:
  schedule:
    - cron: "*/5 * * * *"   # toutes les 5 minutes
  workflow_dispatch:        # bouton Run workflow manuel

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ingest (Gmail API)
        run: |
          echo "Calling ingest..."
          curl -fsS "${{ secrets.CRON_INGEST_URL }}" | head -c 2000 || true

      - name: Ping dispatch (notifications)
        run: |
          echo "Calling dispatch..."
          curl -fsS "${{ secrets.CRON_DISPATCH_URL }}" | head -c 2000 || true
