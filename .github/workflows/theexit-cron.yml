name: TheExit Cron Pings

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ingest (Gmail API)
        run: |
          echo "Calling ingest..."
          curl -fLsS "${{ secrets.CRON_INGEST_URL }}" | head -c 4000

      - name: Ping dispatch (notifications)
        run: |
          echo "Calling dispatch..."
          curl -fLsS "${{ secrets.CRON_DISPATCH_URL }}" | head -c 4000
